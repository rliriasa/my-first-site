<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#080d18"/>

  <!-- Subtle corner accent -->
  <line x1="0" y1="0" x2="40" y2="0" stroke="#c9a84c" stroke-width="2"/>
  <line x1="0" y1="0" x2="0" y2="40" stroke="#c9a84c" stroke-width="2"/>
  <line x1="400" y1="400" x2="360" y2="400" stroke="#c9a84c" stroke-width="2"/>
  <line x1="400" y1="400" x2="400" y2="360" stroke="#c9a84c" stroke-width="2"/>

  <!-- LIRIA wordmark -->
  <text
    x="200" y="196"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="82"
    font-weight="400"
    fill="#e8edf5"
    letter-spacing="14">LIRIA</text>

  <!-- Gold rule -->
  <line x1="108" y1="216" x2="292" y2="216" stroke="#c9a84c" stroke-width="1.4"/>

  <!-- RESEARCH label -->
  <text
    x="200" y="244"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="12"
    fill="rgba(180,192,210,0.55)"
    letter-spacing="9">RESEARCH</text>
</svg>
