<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#080d18"/>

  <!-- Subtle vertical divider — one-third left -->
  <line x1="500" y1="80" x2="500" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Top-left label -->
  <text
    x="100" y="155"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="11"
    fill="rgba(180,192,210,0.38)"
    letter-spacing="5">INDEPENDENT EQUITY RESEARCH</text>

  <!-- LIRIA — large display -->
  <text
    x="94" y="310"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="148"
    font-weight="400"
    fill="#e8edf5"
    letter-spacing="16">LIRIA</text>

  <!-- Gold rule under LIRIA -->
  <line x1="100" y1="335" x2="490" y2="335" stroke="#c9a84c" stroke-width="1.8"/>

  <!-- RESEARCH -->
  <text
    x="100" y="368"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="14"
    fill="rgba(180,192,210,0.45)"
    letter-spacing="10">RESEARCH</text>

  <!-- Right side — tagline block -->
  <text
    x="580" y="210"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="30"
    font-weight="400"
    fill="rgba(232,237,245,0.75)"
    letter-spacing="1">Emerging Markets · Futurist Bets</text>

  <!-- Thin rule -->
  <line x1="580" y1="232" x2="900" y2="232" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Three pillars / bullets -->
  <text x="580" y="272" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(60,184,122,0.65)" letter-spacing="1">●</text>
  <text x="600" y="272" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(180,192,210,0.45)" letter-spacing="1">Dominant franchises in high-growth EM</text>

  <text x="580" y="300" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(167,139,250,0.65)" letter-spacing="1">●</text>
  <text x="600" y="300" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(180,192,210,0.45)" letter-spacing="1">Futurist bets with 10-year optionality</text>

  <text x="580" y="328" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(180,192,210,0.3)" letter-spacing="1">●</text>
  <text x="600" y="328" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="rgba(180,192,210,0.35)" letter-spacing="1">Full thesis on every position. No paywall.</text>

  <!-- URL bottom right -->
  <text
    x="1400" y="440"
    text-anchor="end"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="13"
    fill="rgba(180,192,210,0.25)"
    letter-spacing="3">liriaresearch.com</text>
</svg>
