name: Weekly Editorial Engine

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday 1pm UTC = 9am ET
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  editorial:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run data refresh first
        run: python scripts/refresh_data.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Run editorial engine
        run: python scripts/ai_editorial.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push all changes
        run: |
          git config user.name  "liria-editorial[bot]"
          git config user.email "editorial@liriaresearch.com"
          git add publications/ data/
          if git diff --staged --quiet; then
            echo "Nothing new to publish this week."
            exit 0
          fi
          MSG=$(python3 -c 'import json; d=json.load(open("data/editorial_decision.json")); print(d.get("ticker","note") + " - " + str(d.get("title", d.get("reasoning","weekly update")))[:60])' 2>/dev/null || echo "weekly update")
          git commit -m "editorial: $MSG"
          git push
