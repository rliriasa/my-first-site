name: Refresh Market Data

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 2pm UTC = 10am ET, Mon–Fri (post-open)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to push the updated data files

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        run: python scripts/refresh_data.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || \
            git commit -m "chore: refresh market data $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push
